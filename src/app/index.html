<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

<style>
    .samples-section {
  padding: 80px 20px;
  text-align: center;
  background: #f9fafc;
}

.samples-section h2 {
  font-size: 36px;
  margin-bottom: 10px;
  font-weight: 700;
}

.samples-section .subtitle {
  color: #666;
  margin-bottom: 50px;
}

.samples-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  max-width: 1200px;
  margin: auto;
}

.sample-card {
  background: #ffffff;
  padding: 35px 25px;
  border-radius: 14px;
  text-decoration: none;
  color: #111;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
  transition: all 0.3s ease;
}

.sample-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
}

.sample-card h3 {
  margin-bottom: 15px;
  font-size: 20px;
}

.sample-card span {
  font-size: 14px;
  color: #0073e6;
  font-weight: 600;
}
</style>
<body>

    <section class="samples-section">
  <h2>Our Work Samples</h2>
  <p class="subtitle">Click any category to explore detailed project samples.</p>

  <div class="samples-grid">
